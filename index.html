<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>My Page</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

  <div class="hero-content">
    <h1>ALBERT</h1>
  </div>

  <!-- スクロールボタン -->
  <a href="#content" class="scroll-down">
  <span></span>
  </a>
  
</section>

  <!-- Content --> 
<section class="about">

  <h2>Content</h2>

  <div class="about-line"></div>

  <div class="about-container">

    <div class="about-item">
      <img src="images/download3.svg" alt="">
      <h3>教材販売</h3>
      <p>ギターをゼロから始める初心者向けに、<br>とてもわかりやすく説明したPDF教材を販売しています。</p>
    </div>

    <div class="about-item">
      <img src="images/youtube.png" alt="">
      <h3>YouTube</h3>
      <p>ゲーム、アニメ、クラシックなど様々なカバーを演奏しています。</p>
    </div>

    <div class="about-item">
      <img src="images/audiostock2.png" alt="">
      <h3>Audiostock</h3>
      <p>Audiostockとは著作権フリーのBGM販売サイトです。当サイトで購入した楽曲は、権利者の許諾なくあらゆるシーンで使用できます。</p>
    </div>

  </div>

</section>
  
 <!-- プロフィール --> 
 <section class="profile">

<div class="about-flex">

    <!-- 左：文章 -->
    <div class="about-text">
      <h2>About Guitar</h2>
      <p>
        ギターは多くのジャンルで使われる楽器です。<br>
        アコースティックギターやエレキギターなど<br>
        さまざまな種類があります。
      </p>
    </div>

    <!-- 右：画像 -->
    <div class="about-image">
      <img src="images/profile1.png" alt="profile1">
    </div>

  </div>

</section>
  
    <!-- コンタクトフォーム --> 
  <section class="contact">

  <div class="contact-inner">

    <h2 class="contact-title">Contact</h2>

    <form class="contact-form">

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Your message"></textarea>
      </div>

      <div class="form-submit">
        <button type="submit">Send Message</button>
      </div>

    </form>

  </div>

</section>


<script src="script.js"></script>
</body>
</html>
