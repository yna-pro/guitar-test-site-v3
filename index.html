<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>My Page</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

  <div class="hero-content">
    <h1>ALBERT</h1>
  </div>

  <!-- スクロールボタン -->
  <a href="#content" class="scroll-down">
  <span></span>
  </a>
  
</section>

<section class="about">

  <h2>Content</h2>

  <div class="about-line"></div>

  <div class="about-container">

    <div class="about-item">
      <img src="images/download.svg" alt="">
      <h3>教材販売</h3>
      <p>ギターをゼロから始める初心者向けに、<br>とてもわかりやすく説明したPDF教材を販売しています。</p>
    </div>

    <div class="about-item">
      <img src="images/youtube.png" alt="">
      <h3>YouTube</h3>
      <p>ゲーム、アニメ、クラシックなど様々なカバーを演奏しています。</p>
    </div>

    <div class="about-item">
      <img src="images/audiostock2.png" alt="">
      <h3>Audiostock</h3>
      <p>Audiostockとは著作権フリーのBGM販売サイトです。当サイトで購入した楽曲は、権利者の許諾なくあらゆるシーンで使用できます。</p>
    </div>

  </div>

</section>

   <!-- プロフィール -->
  <section id="profile" class="wrapper alt style1">
  <div class="inner">

    <h2 class="major">プロフィール</h2>

    <div class="about-container">

      <div class="about-text">
        <p>
        アルベルトと申します。
        </p>
      </div>

      <div class="about-image">
        <img src="images/profile1.png" alt="profile2">
      </div>

    </div>

  </div>
</section>

  <!-- Footer -->
					<section id="footer">
						<div class="inner">
							<h2 class="major">コンタクト</h2>
							<p>何でも聞いてください。</p>
							<div class="contact-form-center">
							<form method="post" action="#">
								<div class="fields">
									<div class="field">
										<label for="name">Name</label>
										<input type="text" name="name" id="name" />
									</div>
									<div class="field">
										<label for="email">Email</label>
										<input type="email" name="email" id="email" />
									</div>
									<div class="field">
										<label for="message">Message</label>
										<textarea name="message" id="message" rows="4"></textarea>
									</div>
								</div>
								<ul class="actions">
									<li><input type="submit" value="Send Message" /></li>
								</ul>
							</form>
								</div>
							<ul class="copyright">
								<li>&copy; Untitled Inc. All rights reserved.</li><li>Design: <a href="http://html5up.net">HTML5 UP</a></li>
							</ul>
						</div>
					</section>
  
<script src="script.js"></script>
</body>
</html>
